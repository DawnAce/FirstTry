<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国经营报 · 发行系统 — 功能思维导图</title>
<style>
  :root{
    --bg:#0f172a; --panel:#fff; --ink:#1e293b; --muted:#64748b; --line:#e2e8f0;
    --chip:#f1f5f9;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Microsoft YaHei","PingFang SC","Segoe UI",system-ui,sans-serif;
       background:linear-gradient(160deg,#0f172a,#1e293b);color:var(--ink)}
  header{padding:22px 28px 16px;color:#fff}
  header h1{margin:0;font-size:22px;font-weight:800;letter-spacing:.5px}
  header .sub{margin-top:4px;color:#94a3b8;font-size:13px}
  .stats{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap}
  .stat{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
        border-radius:10px;padding:8px 14px;color:#e2e8f0;font-size:13px}
  .stat b{font-size:18px;color:#fff;margin-right:6px}
  .toolbar{position:sticky;top:0;z-index:5;display:flex;gap:8px;flex-wrap:wrap;align-items:center;
           padding:12px 28px;background:rgba(15,23,42,.85);backdrop-filter:blur(6px);
           border-bottom:1px solid rgba(255,255,255,.08)}
  .toolbar input{flex:1;min-width:180px;max-width:340px;padding:8px 12px;border-radius:8px;
        border:1px solid #334155;background:#0b1222;color:#e2e8f0;font-size:14px;outline:none}
  .toolbar input::placeholder{color:#64748b}
  .btn{padding:7px 13px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#cbd5e1;
       font-size:13px;cursor:pointer;transition:.15s}
  .btn:hover{background:#334155;color:#fff}
  .btn.active{background:#2563eb;border-color:#2563eb;color:#fff}
  .legend{display:flex;gap:12px;flex-wrap:wrap;padding:10px 28px;color:#94a3b8;font-size:12px}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex:none}
  .canvas{margin:18px 22px 60px;background:var(--panel);border-radius:16px;
          padding:22px 26px;box-shadow:0 20px 50px rgba(0,0,0,.35)}
  /* tree */
  .node{position:relative}
  .row{display:flex;align-items:flex-start;gap:8px;padding:3px 6px;border-radius:8px;cursor:default;
       transition:background .12s}
  .row.has-children{cursor:pointer}
  .row:hover{background:#f8fafc}
  .caret{flex:none;width:18px;height:22px;display:flex;align-items:center;justify-content:center;
         color:#94a3b8;font-size:11px;transition:transform .15s}
  .collapsed > .row > .caret{transform:rotate(-90deg)}
  .caret.empty{visibility:hidden}
  .label{font-size:14.5px;line-height:1.5;color:var(--ink)}
  .children{margin-left:20px;padding-left:14px;border-left:2px solid var(--line)}
  .collapsed > .children{display:none}
  /* level/role styles */
  .lv-root > .row > .label{font-size:18px;font-weight:800}
  .lv-branch > .row{padding:6px 8px;margin-top:4px}
  .lv-branch > .row > .label{font-size:16px;font-weight:800}
  .lv-group > .row > .label{font-weight:700;color:#334155}
  .lv-feature > .row > .label{font-weight:600}
  .lv-cap > .row{cursor:default}
  .lv-cap > .row > .label{font-size:13px;color:#475569}
  .lv-cap > .row:hover{background:#f8fafc}
  .bdot{width:11px;height:11px;border-radius:50%;flex:none;margin-top:6px}
  .badge{display:inline-block;margin-left:8px;background:#16a34a;color:#fff;font-size:10px;
         font-weight:700;border-radius:6px;padding:1px 7px;vertical-align:middle}
  .route{display:inline-block;margin-left:8px;font-family:ui-monospace,Consolas,monospace;
         font-size:11px;color:#2563eb;background:#eff6ff;border-radius:5px;padding:1px 6px}
  .api{display:inline-block;margin-left:6px;font-size:11px;color:#94a3b8;cursor:help}
  .note{margin-left:8px;font-size:11.5px;color:#94a3b8;font-style:italic}
  mark{background:#fde68a;color:#92400e;border-radius:3px;padding:0 2px}
  .hidden{display:none !important}
  .count{font-size:11px;color:#94a3b8;font-weight:500;margin-left:6px}
  footer{color:#64748b;font-size:12px;text-align:center;padding:0 0 28px}
</style>
</head>
<body>
<header>
  <h1>中国经营报 · 发行系统 — 功能思维导图</h1>
  <div class="sub">按子系统梳理的当前全量功能（点击节点展开/折叠，可搜索）。绿色「新」= 本轮新增的客户/合同/财务模块。</div>
  <div class="stats" id="stats"></div>
</header>
<div class="toolbar">
  <input id="search" placeholder="🔎 搜索功能 / 能力（如：退款、排发、PDF、冲红…）">

  <button class="btn" id="collapseAll">折叠到模块</button>
  <button class="btn" id="onlyNew">只看新增</button>
</div>
<div class="legend" id="legend"></div>
<div class="canvas"><div id="tree"></div></div>
<footer>由代码库自动盘点生成 · 节点对应真实页面/接口能力</footer>

/* ---- 渲染 ---- */
const tree = document.getElementById('tree');
let nFeat=0, nCap=0, nMod=0;
function build(node, depth, color){
  const lv = depth===0?'root':depth===1?'branch':(node.c&&node.c.length&&depth===2&&node.color?'group':(node.c&&node.c.length?'feature':'cap'));
  const div = document.createElement('div');
  div.className = 'node lv-'+lv;
  const hasKids = node.c && node.c.length;
  if(depth===1) nMod++;
  if(lv==='feature') nFeat++;
  if(lv==='cap') nCap++;
  const branchColor = node.color || color;

  const row = document.createElement('div');
  row.className = 'row'+(hasKids?' has-children':'');
  let inner = `<span class="caret${hasKids?'':' empty'}">▶</span>`;
  if(depth>=1) inner += `<span class="bdot" style="background:${branchColor}"></span>`;
  inner += `<span class="label">${esc(node.n)}`;
  if(node.b) inner += `<span class="badge">${node.b}</span>`;
  if(node.r) inner += `<span class="route">${esc(node.r)}</span>`;
  if(node.e && node.e.length) inner += `<span class="api" title="${esc(node.e.join('\n'))}">· ${node.e.length} 接口</span>`;
  if(node.d) inner += `<span class="note">${esc(node.d)}</span>`;
  if(hasKids && lv!=='cap') inner += `<span class="count">(${count(node)})</span>`;
  inner += `</span>`;
  row.innerHTML = inner;
  div.appendChild(row);

  if(hasKids){
    const kids = document.createElement('div');
    kids.className = 'children';
    node.c.forEach(ch => kids.appendChild(build(ch, depth+1, branchColor)));
    div.appendChild(kids);
    row.addEventListener('click', e=>{ e.stopPropagation(); div.classList.toggle('collapsed'); });
  }
  return div;
}
function count(node){ // 统计叶子能力数
  if(!node.c) return 0;
  let s=0; node.c.forEach(c=> s += (c.c&&c.c.length)?count(c):1); return s;
}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

tree.appendChild(build(DATA,0,'#334155'));

/* 默认：模块以下折叠（展开到 branch + group） */
function setCollapsedBelow(level){
  document.querySelectorAll('.node').forEach(n=>{
    const isFeature = n.classList.contains('lv-feature');
    const isGroup = n.classList.contains('lv-group');
    if(isFeature) n.classList.add('collapsed');
    else n.classList.remove('collapsed');
  });
}
setCollapsedBelow();

/* 统计卡 */
document.getElementById('stats').innerHTML =
  `<div class="stat"><b>${nMod}</b>大模块</div>`+
  `<div class="stat"><b>${nFeat}</b>项功能</div>`+
  `<div class="stat"><b>${nCap}</b>能力点</div>`+
  `<div class="stat" style="border-color:#16a34a55"><b style="color:#4ade80">3</b>新增模块（客户/合同/财务）</div>`;

/* 图例 */
const branches = DATA.c.map(b=>({n:b.n,c:b.color}));
document.getElementById('legend').innerHTML = branches.map(b=>
  `<span><i class="dot" style="background:${b.c}"></i>${esc(b.n)}</span>`).join('');

/* 工具栏 */
document.getElementById('expandAll').onclick = ()=> document.querySelectorAll('.node').forEach(n=>n.classList.remove('collapsed'));
document.getElementById('collapseAll').onclick = ()=> setCollapsedBelow();
let onlyNew=false;
document.getElementById('onlyNew').onclick = function(){
  onlyNew=!onlyNew; this.classList.toggle('active',onlyNew);
  document.querySelectorAll('#tree > .node > .children > .node').forEach(branch=>{
    const isNew = branch.querySelector(':scope > .row .badge');
    branch.classList.toggle('hidden', onlyNew && !isNew);
  });
};

/* 搜索：高亮 + 自动展开命中路径，隐藏无关分支 */
const search = document.getElementById('search');
search.addEventListener('input', ()=>{
  const q = search.value.trim().toLowerCase();
  document.querySelectorAll('mark').forEach(m=> m.replaceWith(m.textContent));
  if(!q){ document.querySelectorAll('.node').forEach(n=>n.classList.remove('hidden')); setCollapsedBelow(); return; }
  function walk(node){
    const label = node.querySelector(':scope > .row > .label');
    const own = label ? label.textContent.toLowerCase().includes(q) : false;
    let childMatch=false;
    node.querySelectorAll(':scope > .children > .node').forEach(ch=>{ if(walk(ch)) childMatch=true; });
    const match = own || childMatch;
    node.classList.toggle('hidden', !match);
    if(match){ node.classList.remove('collapsed'); if(own && label) highlight(label,q); }
    return match;
  }
  document.querySelectorAll('#tree > .node').forEach(walk);
});
function highlight(label,q){
  const t=label.childNodes[0]; // 仅处理纯文本首节点
  label.querySelectorAll('*').forEach(()=>{});
  const text = label.firstChild;
  if(text && text.nodeType===3){
    const i = text.textContent.toLowerCase().indexOf(q);
    if(i>=0){
      const span=document.createElement('span');
      const before=text.textContent.slice(0,i), hit=text.textContent.slice(i,i+q.length), after=text.textContent.slice(i+q.length);
      span.appendChild(document.createTextNode(before));
      const m=document.createElement('mark'); m.textContent=hit; span.appendChild(m);
      span.appendChild(document.createTextNode(after));
      text.replaceWith(span);
    }
  }
}
