name: CI

# 每个 PR + 合并到 main 时，自动跑后端测试与完整前端门禁。
on:
  pull_request:
  push:
    branches: [main]

# 同一分支的新推送取消旧的在跑任务，省额度。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: 后端测试 (pytest)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ci
          MYSQL_DATABASE: ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -pci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    defaults:
      run:
        working-directory: backend
    # 单元测试用 SQLite 内存库；同一 job 先用空 MySQL 验证完整迁移链。
    env:
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: ci
      MYSQL_DATABASE: ci
      JWT_SECRET: ci-only-secret-that-is-at-least-32-characters
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          pip install pytest httpx
      - name: 从空 MySQL 应用完整迁移
        run: python -m alembic upgrade head
      - name: 跑测试
        run: python -m pytest -q

  frontend:
    name: 前端检查 (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: 安装依赖
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: 单元测试
        run: npm test
      - name: 生产构建
        run: npm run build
