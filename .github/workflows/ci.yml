name: CI

# 每个 PR + 合并到 main 时，自动跑后端测试与完整前端门禁。
on:
  pull_request:
  push:
    branches: [main]

# 同一分支的新推送取消旧的在跑任务，省额度。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: 后端测试 (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # 测试用 SQLite 内存库（get_db 被 override），不连 MySQL；但 app.config.Settings
    # 硬要这几个变量才能导入，给假值即可（create_engine 懒连接、startup 预热在测试里不触发）。
    env:
      MYSQL_HOST: localhost
      MYSQL_PORT: "3306"
      MYSQL_USER: ci
      MYSQL_PASSWORD: ci
      MYSQL_DATABASE: ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          pip install pytest httpx
      - name: 跑测试
        run: python -m pytest -q

  frontend:
    name: 前端检查 (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: 安装依赖
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: 单元测试
        run: npm test
      - name: 生产构建
        run: npm run build
